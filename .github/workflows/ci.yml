name: Spring Boot CI

# 언제 이 스크립트를 실행할 것인가?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 최신 리눅스 컴퓨터 사용(내 코드를 테스트할 가상의 컴퓨터)

    steps:
      - name: 1. 내 깃허브 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Java 25 설치하기
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 3. gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. Spring Boot 프로젝트 빌드 및 테스트 진행!
        run: ./gradlew build